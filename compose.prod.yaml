services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-ghostdrop}
            POSTGRES_DB: ${POSTGRES_DB:-ghostdrop}
            POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
        secrets:
            - postgres_password
        volumes:
            - prod_postgres_data:/var/lib/postgresql/data
        networks:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"'
        secrets:
            - redis_password
        volumes:
            - prod_redis_data:/data
        networks:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:RELEASE.2024-06-22T05-26-45Z
        restart: unless-stopped
        environment:
            MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
            MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
        command: server /data --console-address ":9001"
        secrets:
            - minio_root_user
            - minio_root_password
        volumes:
            - prod_minio_data:/data
        networks:
            - backend

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: 3100
            DOMAIN: ${DOMAIN:?Set DOMAIN in your production env file}
            CORS_ORIGINS: ${CORS_ORIGINS:-}
            MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-1073741824}
            MAX_DOWNLOADS: ${MAX_DOWNLOADS:-10}
            MAX_EXPIRES_IN_MINUTES: ${MAX_EXPIRES_IN_MINUTES:-10080}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER:-ghostdrop}
            POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
            POSTGRES_DB: ${POSTGRES_DB:-ghostdrop}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD_FILE: /run/secrets/redis_password
            MINIO_ENDPOINT: minio
            MINIO_PORT: 9000
            MINIO_USE_SSL: "false"
            MINIO_ACCESS_KEY_FILE: /run/secrets/minio_root_user
            MINIO_SECRET_KEY_FILE: /run/secrets/minio_root_password
            MINIO_BUCKET: ${MINIO_BUCKET:-ghostdrop}
        secrets:
            - postgres_password
            - redis_password
            - minio_root_user
            - minio_root_password
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_started
        networks:
            - backend

    gateway:
        build:
            context: .
            dockerfile: Caddy.Dockerfile.production
        restart: unless-stopped
        environment:
            DOMAIN: ${DOMAIN:?Set DOMAIN in your production env file}
            ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in your production env file}
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - prod_caddy_data:/data
            - prod_caddy_config:/config
        depends_on:
            - api
        networks:
            - backend

networks:
    backend:

volumes:
    prod_postgres_data:
    prod_redis_data:
    prod_minio_data:
    prod_caddy_data:
    prod_caddy_config:

secrets:
    postgres_password:
        file: ./secrets/postgres_password.txt
    redis_password:
        file: ./secrets/redis_password.txt
    minio_root_user:
        file: ./secrets/minio_root_user.txt
    minio_root_password:
        file: ./secrets/minio_root_password.txt
