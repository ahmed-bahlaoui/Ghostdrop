volumes:
    ghostdrop_postgres_data:

services:
    postgres:
        image: postgres:latest
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydb
        ports:
            - "5433:5432"
        volumes:
            - ghostdrop_postgres_data:/var/lib/postgresql
    
    redis:
        image: redis:latest
        ports:
            - "6380:6379"
    
    minio:
        image: minio/minio:latest
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        command: server /data
        ports:
            - "9000:9000"
